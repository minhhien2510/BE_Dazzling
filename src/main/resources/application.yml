spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}

jwt:
  secret: CHANGE_ME_SUPER_SECRET_KEY_1234567890
  expiration-ms: 3600000
  refresh-expiration-ms: 604800000

minio:
  endpoint: https://minio-production-2502.up.railway.app/
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: dazzling-gallery
  presigned:
    expiry-seconds: 30